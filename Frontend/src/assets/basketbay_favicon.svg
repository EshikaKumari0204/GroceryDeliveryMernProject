<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Basket body -->
  <clipPath id="bc">
    <path d="M4,14 Q4,28 16,29 Q28,28 28,14 Z"/>
  </clipPath>
  <path d="M4,14 Q4,28 16,29 Q28,28 28,14 Z" fill="#F59E0B"/>
  <!-- Weave horizontal lines -->
  <g clip-path="url(#bc)">
    <line x1="3" y1="19" x2="29" y2="19" stroke="#B45309" stroke-width="1.2" opacity="0.7"/>
    <line x1="3" y1="24" x2="29" y2="24" stroke="#B45309" stroke-width="1.2" opacity="0.7"/>
    <!-- vertical lines -->
    <line x1="10" y1="13" x2="10" y2="30" stroke="#B45309" stroke-width="1" opacity="0.5"/>
    <line x1="16" y1="13" x2="16" y2="30" stroke="#B45309" stroke-width="1" opacity="0.5"/>
    <line x1="22" y1="13" x2="22" y2="30" stroke="#B45309" stroke-width="1" opacity="0.5"/>
  </g>
  <!-- Rim -->
  <rect x="3" y="11" width="26" height="5" rx="2.5" fill="#111111"/>
  <!-- Handle -->
  <path d="M10,11 Q10,2 16,2 Q22,2 22,11" fill="none" stroke="#111111" stroke-width="3" stroke-linecap="round"/>
</svg>
